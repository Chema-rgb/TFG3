<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia - Matrículas</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="dashboard.html">Academia</a></div>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-user">
            <span id="navUsername"></span>
            <button onclick="logout()" class="btn btn-sm">Salir</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Matrículas</h2>
            <button class="btn btn-primary" id="btnNuevaMatricula">+ Nueva Matrícula</button>
        </div>

        <div class="table-container">
            <table class="tabla">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Alumno</th>
                        <th>Curso</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyMatriculas"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="modalMatricula" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalMatriculaTitle">Nueva Matrícula</h3>
                <button class="modal-close" onclick="cerrarModal('modalMatricula')">&times;</button>
            </div>
            <form id="formMatricula">
                <input type="hidden" id="matriculaId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Alumno</label>
                        <select id="matriculaAlumno" required>
                            <option value="">Selecciona alumno</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Curso</label>
                        <select id="matriculaCurso" required>
                            <option value="">Selecciona curso</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="matriculaEstado">
                            <option value="ACTIVA">Activa</option>
                            <option value="CANCELADA">Cancelada</option>
                            <option value="COMPLETADA">Completada</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="cerrarModal('modalMatricula')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/matriculas.js"></script>
</body>
</html>
