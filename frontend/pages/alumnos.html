<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia - Alumnos</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="dashboard.html">Academia</a></div>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-user">
            <span id="navUsername"></span>
            <button onclick="logout()" class="btn btn-sm">Salir</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Alumnos</h2>
            <button class="btn btn-primary" id="btnNuevoAlumno">+ Nuevo Alumno</button>
        </div>

        <div class="table-container">
            <table class="tabla" id="tablaAlumnos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellidos</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyAlumnos"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Alumno -->
    <div class="modal" id="modalAlumno" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalAlumnoTitle">Nuevo Alumno</h3>
                <button class="modal-close" onclick="cerrarModal('modalAlumno')">&times;</button>
            </div>
            <form id="formAlumno">
                <input type="hidden" id="alumnoId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="alumnoNombre" required>
                    </div>
                    <div class="form-group">
                        <label>Apellidos</label>
                        <input type="text" id="alumnoApellidos" required>
                    </div>
                    <div class="form-group">
                        <label>DNI</label>
                        <input type="text" id="alumnoDni">
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="alumnoTelefono">
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" id="alumnoDireccion">
                    </div>
                    <div class="form-group">
                        <label>Fecha Nacimiento</label>
                        <input type="date" id="alumnoFechaNacimiento">
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="alumnoEstado">
                            <option value="ACTIVO">Activo</option>
                            <option value="INACTIVO">Inactivo</option>
                            <option value="BAJA">Baja</option>
                        </select>
                    </div>
                    <div class="form-group" id="campoUsuario">
                        <label>Username (login)</label>
                        <input type="text" id="alumnoUsername">
                    </div>
                    <div class="form-group" id="campoPassword">
                        <label>Password</label>
                        <input type="password" id="alumnoPassword">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="alumnoEmail">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="cerrarModal('modalAlumno')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/alumnos.js"></script>
</body>
</html>
