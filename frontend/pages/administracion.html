<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia - Administración</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="dashboard.html">Academia</a></div>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-user">
            <span id="navUsername"></span>
            <button onclick="cerrarSesion()" class="btn btn-sm">Salir</button>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">Administración</h2>

        <!-- Resumen de pagos -->
        <div class="section-title">Resumen de Pagos</div>
        <div class="stats-grid" id="statsPagos"></div>

        <!-- Alumnos con pagos vencidos -->
        <div class="section-title" style="margin-top:2rem">Alumnos con Pagos Vencidos</div>
        <div class="table-container">
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Alumno</th>
                        <th>Concepto</th>
                        <th>Importe</th>
                        <th>Vencimiento</th>
                    </tr>
                </thead>
                <tbody id="tbodyVencidos"></tbody>
            </table>
        </div>

        <!-- Ocupación de cursos -->
        <div class="section-title" style="margin-top:2rem">Ocupación de Cursos</div>
        <div class="table-container">
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Curso</th>
                        <th>Profesor</th>
                        <th>Alumnos</th>
                        <th>Capacidad</th>
                        <th>Ocupación</th>
                    </tr>
                </thead>
                <tbody id="tbodyOcupacion"></tbody>
            </table>
        </div>

        <!-- Credenciales -->
        <div class="page-header" style="margin-top:2rem">
            <div class="section-title" style="margin:0">Credenciales</div>
            <button class="btn btn-primary" id="btnNuevoAdmin">+ Nuevo Admin</button>
        </div>
        <div class="table-container">
            <table class="tabla">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Creado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyAdmins"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Admin -->
    <div class="modal" id="modalAdmin" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nuevo Administrador</h3>
                <button class="modal-close" onclick="cerrarModal('modalAdmin')">&times;</button>
            </div>
            <form id="formAdmin">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="adminUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="adminEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="adminPassword" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="cerrarModal('modalAdmin')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/administracion.js"></script>
</body>
</html>
